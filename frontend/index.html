<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FINTECH BY AMITY - 3D Finance OS</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Styles -->
    <link rel="stylesheet" href="style.css">
    <!-- Chart.js for Analytics -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Three.js for 3D Intro Launch -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
    <!-- 3D Three.js Canvas Container -->
    <div id="three-container"></div>

    <!-- Global Background Elements (Active after 3D intro) -->
    <div id="global-bg" class="hidden">
        <div class="bg-orb orb-primary"></div>
        <div class="bg-orb orb-secondary"></div>
        <div class="bg-grid"></div>
    </div>

    <!-- Landing View -->
    <div id="view-landing" class="view hidden">
        <div class="landing-content glass p-6 rounded-2xl text-center" id="landing-card">
            <div class="logo-3d-text">FINTECH<br><span>BY AMITY</span></div>
            <p class="mb-4 text-secondary mt-2">The Next Generation Financial OS</p>
            <div class="input-group mt-6 mb-4">
                <input type="number" id="startup-budget" placeholder="Enter Starting Budget (₹)" class="input-glow">
            </div>
            <button id="btn-enter" class="primary-btn mt-4 full-width">Initialize OS Core →</button>
        </div>
    </div>

    <!-- Main OS Layout -->
    <div id="main-layout" class="hidden">
        <!-- Sidebar Navigation -->
        <aside id="sidebar" class="glass">
